<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <title>{{ page.title | default: "Pattern Recognition and Machine Learning" }}</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Pattern Recognition and Machine Learning course materials" />

    <link rel="icon" media="(prefers-color-scheme:dark)" href="{{ site.favicon_dark | relative_url }}" type="image/png" />
    <link rel="icon" media="(prefers-color-scheme:light)" href="{{ site.favicon | relative_url }}" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">

    <script type="text/x-mathjax-config">
      MathJax.Hub.Config({
        tex2jax: {
          inlineMath: [['$','$'], ['\\(','\\)']],
          displayMath: [['$$','$$'], ['\\[','\\]']],
          processEscapes: true
        },
        TeX: {
          equationNumbers: { autoNumber: "AMS" }
        }
      });
    </script>
    <script async src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-AMS-MML_HTMLorMML"></script>

    <style>
      :root {
        --text: #111827;
        --muted: #4b5563;
        --line: #d7dee8;
        --link: #1558b0;
        --soft: #f7fafc;
        --nav: #ddeafc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--text);
        background: #ffffff;
        font-family: "Crimson Pro", Georgia, "Times New Roman", serif;
        font-size: 21px;
        line-height: 1.65;
      }

      .topnav {
        background: var(--nav);
        border-bottom: 1px solid #c9daef;
      }

      .topnav-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        max-width: 1200px;
        margin: 0 auto;
        padding: 10px 24px;
      }

      .brand {
        color: #172033;
        font-size: 1.1rem;
        font-weight: 700;
        text-decoration: none;
      }

      .links {
        display: flex;
        gap: 24px;
      }

      .links a {
        color: #172033;
        font-size: 1.05rem;
        font-weight: 600;
        text-decoration: none;
      }

      .links a:hover {
        color: var(--link);
      }

      main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 34px 24px 64px;
      }

      h1, h2, h3, h4 {
        line-height: 1.22;
        margin: 1.25em 0 0.55em;
      }

      h1 {
        font-size: 2.45rem;
      }

      h2 {
        font-size: 1.85rem;
      }

      h3 {
        font-size: 1.35rem;
      }

      p {
        margin: 0 0 1em;
      }

      a {
        color: var(--link);
      }

      img {
        display: block;
        max-width: 100%;
        height: auto;
        margin: 1rem auto;
      }

      blockquote {
        margin: 1.2em 0;
        padding: 0.7em 1em;
        color: #1e293b;
        background: #f8fbff;
        border-left: 4px solid #93b7e8;
      }

      table {
        width: 100%;
        margin: 1.4em 0;
        border-collapse: collapse;
        font-size: 0.92em;
      }

      th, td {
        padding: 0.55em 0.7em;
        border: 1px solid var(--line);
        vertical-align: top;
      }

      th {
        background: #edf4ff;
        font-weight: 700;
      }

      code {
        font-family: Consolas, "SF Mono", monospace;
        font-size: 0.82em;
      }

      pre {
        overflow-x: auto;
        padding: 1em;
        background: var(--soft);
        border: 1px solid var(--line);
      }

      hr {
        margin: 2em 0;
        border: 0;
        border-top: 1px solid var(--line);
      }

      footer {
        max-width: 1120px;
        margin: 0 auto;
        padding: 0 24px 36px;
        color: var(--muted);
        font-size: 0.85rem;
      }

      @media (max-width: 760px) {
        body {
          font-size: 18px;
        }

        .topnav-inner {
          align-items: flex-start;
          flex-direction: column;
          gap: 8px;
        }

        .links {
          flex-wrap: wrap;
          gap: 12px 18px;
        }

        main {
          padding: 24px 16px 48px;
        }

        h1 {
          font-size: 2rem;
        }

        h2 {
          font-size: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <nav class="topnav" aria-label="Site navigation">
      <div class="topnav-inner">
        <a class="brand" href="{{ "/" | relative_url }}">{{ site.title }}</a>
        <div class="links">
          <a href="{{ "/" | relative_url }}">Homepage</a>
          <a href="{{ "/publications.html" | relative_url }}">Publications</a>
          <a href="{{ "/services.html" | relative_url }}">Services</a>
          <a href="{{ "/teaching.html" | relative_url }}">Teaching</a>
        </div>
      </div>
    </nav>
    <main>
      {{ content }}
    </main>
    <footer>
      {% if site.enable_last_update %}
      Last Update:
      <script>
        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        const modiDate = new Date(document.lastModified);
        document.write(modiDate.getDate() + ". " + monthNames[modiDate.getMonth()] + " " + modiDate.getFullYear());
      </script>
      {% endif %}
    </footer>
  </body>
</html>
